<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberMonster - 柯林斯五星词典版</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
            --neon-blue: #00d2ff;
            --bg-dark: #0a0016;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            overflow: hidden; color: white;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; display: block; }

        /* UI 顶栏 */
        #ui-header {
            position: absolute; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .stat-box { font-size: 1.1rem; text-shadow: 0 0 10px var(--neon-blue); font-weight: bold; }

        #progress-container {
            width: 300px; height: 10px; background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; border: 1px solid var(--neon-purple); overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); transition: width 0.3s; }

        /* 初始面板 */
        #study-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 22, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 200;
        }

        .panel {
            background: #1a0033; border: 2px solid var(--neon-purple);
            padding: 30px; border-radius: 20px; width: 550px;
            box-shadow: 0 0 50px var(--neon-purple); text-align: center;
        }

        .word-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin: 20px 0; padding: 15px;
            background: rgba(0,0,0,0.4); border-radius: 10px;
            max-height: 280px; overflow-y: auto; text-align: left;
        }
        .word-item { border-bottom: 1px solid rgba(188, 19, 254, 0.2); padding: 5px 0; font-size: 0.95rem; }

        /* 难度按钮 */
        .diff-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .diff-btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 8px 20px; border-radius: 5px;
            cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s;
        }
        .diff-btn.active { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .start-btn {
            background: var(--neon-purple); color: white; border: none;
            padding: 15px 40px; font-size: 1.3rem; border-radius: 10px;
            cursor: pointer; font-weight: bold; box-shadow: 0 0 20px var(--neon-purple);
            width: 100%; margin-top: 10px;
        }

        /* 输入框 */
        #input-area {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 50; display: none;
        }
        #word-input {
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-pink);
            color: white; font-size: 2rem; text-align: center;
            padding: 10px 20px; outline: none; width: 400px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 222, 0.3);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-header">
        <div class="stat-box">KILLED: <span id="hit-count">0</span></div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="stat-box">MISSED: <span id="miss-count">0</span></div>
    </div>

    <div id="input-area">
        <input type="text" id="word-input" placeholder="READY TO FIRE..." autocomplete="off">
    </div>

    <div id="study-overlay">
        <div class="panel">
            <h2 style="color: var(--neon-pink); margin-top:0; letter-spacing: 2px;">⚡ 柯林斯五星词汇 ⚡</h2>
            <p style="font-size: 0.8rem; color: #888;">(每次随机抽取10个单词进行作战)</p>
            <div id="word-list-display" class="word-grid">
                <!-- 随机单词将注入这里 -->
            </div>
            
            <div class="diff-container">
                <button class="diff-btn" onclick="setDiff(0.4, this)">休闲模式</button>
                <button class="diff-btn active" onclick="setDiff(0.8, this)">标准作战</button>
                <button class="diff-btn" onclick="setDiff(1.5, this)">极速清除</button>
            </div>
            <button class="start-btn" onclick="startGame()">INITIALIZE SESSION</button>
        </div>
    </div>
</div>

    // ---------------- 游戏引擎逻辑 ----------------
    const bgCanvas = document.getElementById('bgCanvas');
    const bCtx = bgCanvas.getContext('2d');
    const gameCanvas = document.getElementById('gameCanvas');
    const gCtx = gameCanvas.getContext('2d');
    const wordInput = document.getElementById('word-input');
    
    let gameSpeed = 0.8;
    let gridOffset = 0;
    let currentWords = []; // 本轮选中的10个
    let monsters = [];
    let lasers = [];
    let hitCount = 0;
    let missCount = 0;
    let totalProcessed = 0;
    let wordsSpawned = 0;
    let gameActive = false;

    // 每次开始前，随机选10个单词
    function pickRandomWords() {
        const shuffled = [...allCollinsWords].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, 10);
    }

    function initStudyPanel() {
        currentWords = pickRandomWords();
        const listDisplay = document.getElementById('word-list-display');
        listDisplay.innerHTML = currentWords.map(w => 
            `<div class="word-item"><b style="color:var(--neon-blue)">${w.en}</b></div>
             <div class="word-item">${w.zh}</div>`
        ).join('');
    }

    // 初始化看板
    initStudyPanel();

    function resize() {
        bgCanvas.width = gameCanvas.width = window.innerWidth;
        bgCanvas.height = gameCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function setDiff(speed, btn) {
        gameSpeed = speed;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function drawGrid() {
        bCtx.fillStyle = '#0a0016';
        bCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        const horizon = bgCanvas.height * 0.45;
        const w = bgCanvas.width;
        const h = bgCanvas.height;

        bCtx.strokeStyle = 'rgba(188, 19, 254, 0.3)';
        for (let i = -w; i < w * 2; i += 100) {
            bCtx.beginPath();
            bCtx.moveTo(w / 2, horizon);
            bCtx.lineTo(i, h);
            bCtx.stroke();
        }

        gridOffset += (gameSpeed * 6);
        if (gridOffset > 80) gridOffset = 0;
        for (let i = 0; i < h - horizon; i += 40) {
            let y = horizon + i + gridOffset;
            if (y > h) continue;
            let opacity = (i / (h - horizon));
            bCtx.strokeStyle = `rgba(188, 19, 254, ${opacity})`;
            bCtx.beginPath();
            bCtx.moveTo(0, y);
            bCtx.lineTo(w, y);
            bCtx.stroke();
        }
    }

    class Monster {
        constructor(wordObj) {
            this.word = wordObj.en;
            this.zh = wordObj.zh;
            this.x = Math.random() * (gameCanvas.width - 240) + 120;
            this.y = -100;
            this.isDead = false;
        }
        draw() {
            gCtx.save();
            gCtx.translate(this.x, this.y);
            gCtx.shadowBlur = 15; gCtx.shadowColor = "#bc13fe";
            gCtx.fillStyle = "#4a0082";
            gCtx.beginPath();
            gCtx.moveTo(-45, 20); gCtx.quadraticCurveTo(-55, -45, 0, -55); gCtx.quadraticCurveTo(55, -45, 45, 20);
            gCtx.closePath(); gCtx.fill();
            gCtx.strokeStyle = "#bc13fe"; gCtx.lineWidth = 2; gCtx.stroke();
            gCtx.fillStyle = "white"; gCtx.fillRect(-18, -25, 10, 18); gCtx.fillRect(8, -25, 10, 18);
            gCtx.fillStyle = "black"; gCtx.fillRect(-14, -15, 4, 4); gCtx.fillRect(12, -15, 4, 4);
            gCtx.shadowBlur = 0; gCtx.fillStyle = "#fff"; gCtx.font = "bold 20px sans-serif";
            gCtx.textAlign = "center"; gCtx.fillText(this.zh, 0, 55);
            gCtx.restore();
        }
        update() {
            this.y += gameSpeed;
            if (this.y > gameCanvas.height - 80) {
                this.isDead = true; missCount++; totalProcessed++; updateUI();
            }
        }
    }

    class Laser {
        constructor(tx, ty) { this.tx = tx; this.ty = ty; this.life = 12; }
        draw() {
            gCtx.beginPath(); gCtx.moveTo(gameCanvas.width / 2, gameCanvas.height - 20);
            gCtx.lineTo(this.tx, this.ty);
            gCtx.strokeStyle = "#00d2ff"; gCtx.lineWidth = this.life;
            gCtx.shadowBlur = 15; gCtx.shadowColor = "#00d2ff"; gCtx.stroke();
            this.life -= 3;
        }
    }

    function updateUI() {
        document.getElementById('hit-count').innerText = hitCount;
        document.getElementById('miss-count').innerText = missCount;
        document.getElementById('progress-bar').style.width = (totalProcessed / 10) * 100 + '%';
    }

    function startGame() {
        document.getElementById('study-overlay').style.display = 'none';
        document.getElementById('input-area').style.display = 'block';
        gameActive = true;
        wordInput.focus();
        hitCount = 0; missCount = 0; totalProcessed = 0; wordsSpawned = 0;
        monsters = []; lasers = []; updateUI();

        const spawnTimer = setInterval(() => {
            if (wordsSpawned < 10 && gameActive) {
                monsters.push(new Monster(currentWords[wordsSpawned]));
                wordsSpawned++;
            } else {
                clearInterval(spawnTimer);
            }
        }, 2200 / gameSpeed);

        requestAnimationFrame(gameLoop);
    }

    wordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = wordInput.value.toLowerCase().trim();
            const target = monsters.find(m => m.word === val && !m.isDead);
            if (target) {
                lasers.push(new Laser(target.x, target.y));
                target.isDead = true; hitCount++; totalProcessed++; updateUI();
            }
            wordInput.value = '';
        }
    });

    function gameLoop() {
        drawGrid();
        gCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
        if (gameActive) {
            gCtx.fillStyle = "#00d2ff"; gCtx.shadowBlur = 15; gCtx.shadowColor = "#00d2ff";
            gCtx.fillRect(gameCanvas.width / 2 - 40, gameCanvas.height - 20, 80, 20);
            for (let i = monsters.length - 1; i >= 0; i--) {
                monsters[i].update(); monsters[i].draw();
                if (monsters[i].isDead) monsters.splice(i, 1);
            }
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].draw(); if (lasers[i].life <= 0) lasers.splice(i, 1);
            }
            if (totalProcessed === 10 && lasers.length === 0) {
                gameActive = false;
                setTimeout(() => {
                    alert(`SESSION OVER\nSUCCESS: ${hitCount}\nFAILED: ${missCount}`);
                    initStudyPanel(); // 刷新下一波随机单词
                    document.getElementById('study-overlay').style.display = 'flex';
                }, 800);
            }
        }
        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
</script>
